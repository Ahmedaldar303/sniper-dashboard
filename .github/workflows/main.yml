name: Sniper Radar pro Auto-Update

on:
  schedule:
    - cron: '*/15 13-21 * * 1-5' # يعمل كل 15 دقيقة وقت السوق
  workflow_dispatch: # يتيح لك التشغيل اليدوي الآن

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests alpaca-py

      - name: Run Sniper Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python scanner.py

      - name: Commit and Push updates
        run: |
          git config --global user.name "Sniper-Bot"
          git config --global user.email "bot@sniper.local"
          git add data.json
          git commit -m "تحديث تلقائي لبيانات الداشبورد [skip ci]" || echo "لا توجد تغييرات"
          git push
