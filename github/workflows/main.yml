name: Update Sniper Dashboard

on:
  schedule:
    - cron: '*/1 * * * *' # يعمل كل دقيقة واحدة
  workflow_dispatch: # يسمح لك بتشغيله يدوياً للتجربة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }} # استخدام السر الذي خزنته
        run: python update_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add options_data.json
          git commit -m "تحديث بيانات القناص تلقائياً" || exit 0
          git push
