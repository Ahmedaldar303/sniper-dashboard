<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper EV Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 15px; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: #94a3b8; }
        .cost { color: #ef4444; font-weight: bold; }
        .profit { color: #22c55e; font-weight: bold; }
        .strike { color: #3b82f6; font-weight: bold; font-size: 1.1em; }
        .signal-good { color: #4ade80; font-weight: bold; background: rgba(34, 197, 94, 0.1); padding: 5px; border-radius: 5px; }
        .signal-bad { color: #f87171; }
        .signal-warn { color: #fbbf24; }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #3b82f6;">🧠 الداشبورد الكمي (نظام القيمة المتوقعة)</h2>
    <table>
        <thead>
            <tr>
                <th>التكلفة (أقصى خسارة)</th>
                <th>صافي الربح</th>
                <th>السترايك</th>
                <th>النوع</th>
                <th>القيمة الإحصائية (EV)</th>
                <th>قرار القناص</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        async function loadData() {
            try {
                const res = await fetch('options_data.json');
                const data = await res.json();
                
                document.getElementById('table-body').innerHTML = data.map(row => {
                    let signalClass = row.signal.includes("صيد") ? "signal-good" : (row.signal.includes("للمراقبة") ? "signal-warn" : "signal-bad");
                    let evColor = row.ev > 0 ? '#4ade80' : '#f87171';
                    
                    return `
                    <tr>
                        <td class="cost">$${row.cost.toFixed(2)}</td>
                        <td class="profit">$${row.profit.toFixed(2)}</td>
                        <td class="strike">${row.strike}</td>
                        <td>${row.type}</td>
                        <td style="color: ${evColor}; direction: ltr;">$${row.ev.toFixed(2)}</td>
                        <td class="${signalClass}">${row.signal}</td>
                    </tr>
                `}).join('');
            } catch (e) { console.log('Waiting for data...'); }
        }
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
