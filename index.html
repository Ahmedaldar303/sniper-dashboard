<div class="row2" style="margin-top:20px;">
    <div class="cp" style="height:auto; padding:15px;">
        <div class="chdr">
            <span style="font-family:var(--fd); color:var(--gold);">🎯 رادار القناص (SPX & NDX Levels)</span>
        </div>
        <table style="width:100%; color:var(--t1); border-collapse:collapse; margin-top:10px; font-family:var(--fm); font-size:12px;">
            <thead>
                <tr style="border-bottom:1px solid var(--b2); color:var(--t2);">
                    <th style="padding:8px; text-align:right;">المؤشر</th>
                    <th style="padding:8px; text-align:right;">الدعم (Support)</th>
                    <th style="padding:8px; text-align:right;">المقاومة (Resistance)</th>
                    <th style="padding:8px; text-align:right;">نقطة الارتكاز (Pivot)</th>
                </tr>
            </thead>
            <tbody id="levelsBody">
                </tbody>
        </table>
    </div>

    <div class="cp" style="height:auto; padding:15px;">
        <div class="chdr">
            <span style="font-family:var(--fd); color:var(--cyan);">💸 جدول عقود الأوبشن المقترحة (0DTE)</span>
        </div>
        <table style="width:100%; color:var(--t1); border-collapse:collapse; margin-top:10px; font-family:var(--fa); font-size:11px;">
            <thead style="background:var(--hover);">
                <tr style="color:var(--t2);">
                    <th style="padding:5px;">السترايك</th>
                    <th style="padding:5px;">التكلفة (أقصى خسارة)</th>
                    <th style="padding:5px;">صافي الربح المتوقع</th>
                </tr>
            </thead>
            <tbody id="optionsBody">
                </tbody>
        </table>
    </div>
</div>

<script>
// دالة لتحديث مستويات SPX و NDX معاً بناءً على نصيحة القناص
function updateProLevels(spxPrice) {
    const ndxPrice = spxPrice * 2.85; // تقدير تقريبي للعلاقة اللحظية
    const levelsHtml = `
        <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
            <td style="padding:10px; color:var(--cyan);">SPX</td>
            <td style="color:var(--bear);">${(spxPrice - 15).toFixed(2)}</td>
            <td style="color:var(--bull);">${(spxPrice + 20).toFixed(2)}</td>
            <td style="color:var(--gold);">${spxPrice.toFixed(2)}</td>
        </tr>
        <tr>
            <td style="padding:10px; color:var(--purple);">NDX</td>
            <td style="color:var(--bear);">${(ndxPrice - 50).toFixed(2)}</td>
            <td style="color:var(--bull);">${(ndxPrice + 70).toFixed(2)}</td>
            <td style="color:var(--gold);">${ndxPrice.toFixed(2)}</td>
        </tr>
    `;
    document.getElementById('levelsBody').innerHTML = levelsHtml;
}

// دالة لتوليد جدول الأوبشن المرتب مالياً
function updateOptionTable(price) {
    const strikes = [Math.floor(price/5)*5, Math.floor(price/5)*5 + 5, Math.floor(price/5)*5 + 10];
    const options = strikes.map(s => {
        const cost = (Math.random() * 2 + 1.5).toFixed(2);
        return {
            strike: s,
            maxLoss: `$${cost * 100}`,
            netProfit: `$${(cost * 150).toFixed(0)}`, // تقدير ربح 150%
            costValue: parseFloat(cost)
        };
    }).sort((a, b) => a.costValue - b.costValue); // الترتيب المالي

    const optionsHtml = options.map(o => `
        <tr style="text-align:center; border-bottom:1px solid rgba(255,255,255,0.03);">
            <td style="padding:8px; font-weight:bold;">${o.strike} C</td>
            <td style="color:var(--bear);">${o.maxLoss}</td>
            <td style="color:var(--bull);">${o.netProfit}</td>
        </tr>
    `).join('');
    document.getElementById('optionsBody').innerHTML = optionsHtml;
}

</script>
