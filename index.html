<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper AI Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 15px; }
        .dashboard-header { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-right: 5px solid #3b82f6; }
        .market-data { display: flex; justify-content: space-between; flex-wrap: wrap; margin-top: 10px; font-weight: bold; }
        .spx-data { color: #3b82f6; }
        .ndx-data { color: #8b5cf6; }
        .direction { color: #22c55e; font-size: 1.1em; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: #94a3b8; }
        .cost { color: #ef4444; font-weight: bold; }
        .profit { color: #22c55e; font-weight: bold; }
        .strike { color: #3b82f6; font-weight: bold; font-size: 1.1em; }
        .rr-good { background: rgba(34, 197, 94, 0.2); color: #4ade80; font-weight: bold; border-radius: 4px; padding: 2px 5px; }
        .rr-bad { color: #f87171; }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <h2>🧠 الرادار الإحصائي للقناص</h2>
        <div class="market-data">
            <span class="direction" id="direction-val">الاتجاه: جاري التحديث...</span>
            <span class="spx-data">SPX (دعم: <span id="spx-sup"></span> | مقاومة: <span id="spx-res"></span>)</span>
            <span class="ndx-data">NDX (دعم: <span id="ndx-sup"></span> | مقاومة: <span id="ndx-res"></span>)</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>التكلفة (أقصى خسارة)</th>
                <th>صافي الربح</th>
                <th>السترايك</th>
                <th>النوع</th>
                <th>العائد/المخاطرة (R/R)</th>
                <th>احتمالية النجاح (POP)</th>
                <th>Delta</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        async function loadData() {
            try {
                const res = await fetch('options_data.json');
                const data = await res.json();
                
                document.getElementById('direction-val').innerText = 'الاتجاه: ' + data.market_context.direction;
                document.getElementById('spx-sup').innerText = data.market_context.spx_support;
                document.getElementById('spx-res').innerText = data.market_context.spx_resistance;
                document.getElementById('ndx-sup').innerText = data.market_context.ndx_support;
                document.getElementById('ndx-res').innerText = data.market_context.ndx_resistance;

                document.getElementById('table-body').innerHTML = data.options.map(row => {
                    const rrClass = row.rr_ratio >= 1.5 ? 'rr-good' : 'rr-bad';
                    return `
                    <tr>
                        <td class="cost">$${row.cost.toFixed(2)}</td>
                        <td class="profit">$${row.profit.toFixed(2)}</td>
                        <td class="strike">${row.strike}</td>
                        <td>${row.type}</td>
                        <td><span class="${rrClass}">${row.rr_ratio}x</span></td>
                        <td>%${row.win_prob}</td>
                        <td>${row.delta.toFixed(3)}</td>
                    </tr>
                `}).join('');
            } catch (e) { console.log('Waiting for data...'); }
        }
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
