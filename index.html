<!DOCTYPE html> 
<html lang="ar" dir="rtl"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>US500 SCALPER PRO v4 - TradingView Edition</title> 
<style> 
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;600;700&display=swap'); 
:root{ 
    --bg:#020508;--panel:#060d14;--hover:#0f1e2e; 
    --b1:#0e2a3f;--b2:#1a4060; 
    --cyan:#00d4ff;--blue:#0088ff;--gold:#ffaa00; 
    --bull:#00e676;--bear:#ff1744;--purple:#8855ff; 
    --bd:rgba(0,230,118,.15);--rd:rgba(255,23,68,.15); 
    --t1:#e8f4ff;--t2:#6a9bbf;--t3:#2a4a60; 
    --gg:0 0 20px rgba(0,255,136,.4);--gr:0 0 20px rgba(255,51,85,.4); 
    --go:0 0 20px rgba(255,170,0,.4); 
    --fm:'Share Tech Mono',monospace;--fd:'Orbitron',sans-serif;--fa:'Cairo',sans-serif; 
} 
*{margin:0;padding:0;box-sizing:border-box} 
body{background:var(--bg);color:var(--t1);font-family:var(--fa);min-height:100vh;overflow-x:hidden} 
body.en{direction:ltr;font-family:var(--fm)} 
.wrap{position:relative;z-index:1;padding:8px;max-width:1700px;margin:0 auto} 
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px; padding:10px 16px;margin-bottom:8px; background:linear-gradient(135deg,rgba(0,25,45,.96),rgba(2,6,12,.98)); border:1px solid var(--b2);border-radius:6px;position:relative;overflow:hidden} 
.logo{font-family:var(--fd);font-size:16px;font-weight:900;letter-spacing:2px; background:linear-gradient(135deg,var(--cyan),var(--blue)); -webkit-background-clip:text;-webkit-text-fill-color:transparent} 
.logo b{background:linear-gradient(135deg,var(--gold),#ff8800); -webkit-background-clip:text;-webkit-text-fill-color:transparent} 
.hdr-mid{display:flex;align-items:center;gap:8px;flex-wrap:wrap} 
.bdg{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:2px;font-size:10px} 
.blv{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:#00ff88} 
.bsrc{border:1px solid rgba(0,212,255,.4);background:rgba(0,212,255,.08);color:var(--cyan);font-family:var(--fm);font-size:9px;letter-spacing:1px} 
.dot{width:5px;height:5px;border-radius:50%;background:#00ff88;animation:bl 1.2s ease-in-out infinite;box-shadow:var(--gg)} 
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}} 
.stag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:2px;font-size:10px;font-family:var(--fm)} 
.tc2{background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.35);color:var(--bull)} 
.tp{background:rgba(255,23,68,.12);border:1px solid rgba(255,23,68,.35);color:var(--bear)} 
.price-box{text-align:left} body:not(.en) .price-box{text-align:right} 
.price-main{font-family:var(--fd);font-size:38px;font-weight:900;line-height:1; color:var(--bull);text-shadow:var(--gg);letter-spacing:1px} 
.price-chg{font-size:13px;color:var(--bull);margin-top:3px;font-family:var(--fm)} 
.price-meta{display:flex;gap:14px;margin-top:4px;flex-wrap:wrap} 
.pm{font-family:var(--fm);font-size:9px;color:var(--t3)}.pm span{color:var(--t2)} 
.price-src{font-family:var(--fm);font-size:9px;color:var(--t3);margin-top:3px} 
.tb{display:flex;align-items:center;gap:5px;flex-wrap:wrap; padding:7px 12px;margin-bottom:8px; background:var(--panel);border:1px solid var(--b1);border-radius:6px} 
.tl{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:2px} 
.btn{padding:3px 11px;background:transparent;border:1px solid var(--b1);color:var(--t2); font-family:var(--fm);font-size:10px;cursor:pointer;border-radius:2px} 
.btn.on{background:rgba(0,212,255,.1);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,.2)} 
.sep{width:1px;height:16px;background:var(--b1);margin:0 5px} 
.sclock{font-family:var(--fm);font-size:11px;color:var(--gold);margin-right:auto} 
.mg{display:grid;grid-template-columns:1fr 290px;gap:8px} 
.cp{background:var(--panel);border:1px solid var(--b1);border-radius:6px;position:relative;display:flex;flex-direction:column} 
.chdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--b1)} 
.ctitle{font-family:var(--fd);font-size:10px;letter-spacing:3px;color:var(--t2)} 

/* TradingView Resizable Container */
.tv-wrap {
    flex: 1;
    min-height: 400px;
    height: 550px;
    width: 100%;
    resize: vertical;
    overflow: hidden;
    position: relative;
    padding-bottom: 5px;
}

.rp{display:flex;flex-direction:column;gap:8px} 
.sb{background:var(--panel);border:1px solid var(--b1);border-radius:6px;overflow:hidden} 
.sb.bull{border-color:rgba(0,230,118,.45);box-shadow:0 0 18px rgba(0,230,118,.1)} 
.sb.bear{border-color:rgba(255,23,68,.45);box-shadow:0 0 18px rgba(255,23,68,.1)} 
.sighdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1)} 
.sighdr.bull{background:linear-gradient(135deg,rgba(0,230,118,.12),transparent)} 
.sighdr.bear{background:linear-gradient(135deg,rgba(255,23,68,.12),transparent)} 
.sigtype{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:2px} 
.sigtype.bull{color:var(--bull)}.sigtype.bear{color:var(--bear)} 
.sbody{padding:10px 14px} 
.srow{display:flex;justify-content:space-between;align-items:center; padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)} 
.slbl2{color:var(--t2);font-size:10px;font-family:var(--fa)} 
.sval2{font-family:var(--fm);font-size:12px;font-weight:600} 
.vg{color:var(--bull)}.vr{color:var(--bear)}.vo{color:var(--gold)}.vc{color:var(--cyan)}.vb{color:#00aaff} 
.alp{background:var(--panel);border:1px solid var(--b1);border-radius:6px;flex:1} 
.phdr{padding:7px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between} 
.ptitle{font-family:var(--fd);font-size:9px;letter-spacing:3px;color:var(--t2)} 
.allist{padding:6px;max-height:230px;overflow-y:auto} 
.botgrid{display:grid;grid-template-columns:repeat(4,1fr) 290px;gap:8px;margin-top:8px} 
.mc{background:var(--panel);border:1px solid var(--b1);border-radius:6px;padding:10px 14px} 
.mlbl{font-family:var(--fm);font-size:8px;color:var(--t3);letter-spacing:2px;margin-bottom:6px} 
.mval{font-family:var(--fd);font-size:20px;font-weight:700;margin-bottom:4px} 
.np{background:var(--panel);border:1px solid rgba(0,212,255,.25);border-radius:6px} 
.nrow{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;border-bottom:1px solid rgba(255,255,255,.03)} 
.nrl{font-family:var(--fa);font-size:10px;color:var(--t2)} 
.nrv{font-family:var(--fm);font-size:11px;color:var(--t1)} 
.row2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px} 
.ecop{background:var(--panel);border:1px solid var(--b1);border-radius:6px;overflow:hidden} 
</style> 
</head> 
<body> 
<div class="wrap"> 
    <div class="hdr"> 
        <div class="logo">US<b>500</b>&nbsp;<span style="font-size:10px;font-family:var(--fd);color:var(--t2)">SCALPER PRO v4</span></div> 
        <div class="hdr-mid"> 
            <div class="bdg blv"><div class="dot"></div><span>مباشر</span></div> 
            <div class="bdg bsrc" id="srcBadge">✅ ES Futures</div> 
        </div> 
        <div class="price-box"> 
            <div class="price-main" id="pMain">جاري...</div> 
            <div class="price-chg" id="pChg">--</div> 
        </div> 
    </div> 

    <div style="background:var(--panel);border:1px solid var(--b2);border-radius:6px;padding:6px;margin-bottom:8px;border-top:2px solid var(--cyan)"> 
        <div class="tradingview-widget-container"> 
            <div class="tradingview-widget-container__widget"></div> 
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async> 
            {"symbols":[{"proName":"FOREXCOM:SPXUSD","title":"US500"},{"proName":"NASDAQ:NDX","title":"NASDAQ"},{"proName":"CBOE:VIX","title":"VIX"}],"showSymbolLogo":true,"isTransparent":true,"displayMode":"compact","colorTheme":"dark","locale":"en"} 
            </script> 
        </div> 
    </div> 

    <div class="tb"> 
        <span class="tl">الإطار الزمني</span> 
        <button class="btn on">1m</button><button class="btn">5m</button> 
        <div class="sep"></div> 
        <span class="sclock" id="sclk">--:--:--</span> 
    </div> 

    <div class="mg"> 
        <div class="cp"> 
            <div class="chdr"> 
                <span class="ctitle">US500 · شارت TradingView المباشر (اسحب للتكبير من الأسفل)</span> 
            </div> 
            
            <div class="tv-wrap">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div id="tv_chart" style="height:100%;width:100%"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                    <script type="text/javascript">
                    new TradingView.widget({
                        "autosize": true,
                        "symbol": "FOREXCOM:SPXUSD",
                        "interval": "1",
                        "timezone": "Asia/Riyadh",
                        "theme": "dark",
                        "style": "1",
                        "locale": "ar",
                        "enable_publishing": false,
                        "hide_side_toolbar": false,
                        "allow_symbol_change": true,
                        "container_id": "tv_chart"
                    });
                    </script>
                </div>
            </div>

        </div> 

        <div class="rp"> 
            <div class="sb bull" id="sigBox"> 
                <div class="sighdr bull" id="sigHdr"> 
                    <div><div style="font-size:8px;color:var(--t3);margin-bottom:3px">الإشارة الحالية</div><div class="sigtype bull" id="sigType">⬆ شراء كول</div></div> 
                </div> 
                <div class="sbody"> 
                    <div class="srow"><span class="slbl2">الدخول</span><span class="sval2 vc" id="sEntry">--</span></div> 
                    <div class="srow"><span class="slbl2">🎯 الهدف 1</span><span class="sval2 vg" id="sT1">--</span></div> 
                    <div class="srow"><span class="slbl2">🎯 الهدف 2</span><span class="sval2 vg" id="sT2">--</span></div> 
                    <div class="srow"><span class="slbl2">🛑 الوقف</span><span class="sval2 vr" id="sSL">--</span></div> 
                </div> 
            </div> 

            <div class="alp"> 
                <div class="phdr"><span class="ptitle">سجل التنبيهات</span></div> 
                <div class="allist" style="padding:10px; font-size:11px; color:var(--t2);">
                    يعتمد السجل على حركة السعر العلوية
                </div> 
            </div> 
        </div> 
    </div> 

    <div class="botgrid"> 
        <div class="mc"><div class="mlbl">VIX · الخوف</div><div class="mval" style="color:var(--gold)">14.20</div></div> 
        <div class="mc"><div class="mlbl">IV RANK</div><div class="mval" style="color:var(--cyan)">35%</div></div> 
        <div class="mc"><div class="mlbl">النطاق</div><div class="mval" style="color:var(--bull)">طبيعي</div></div> 
    </div> 
</div>

<script>
async function fetchPrice() {
    try {
        const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/ES=F?interval=1m&range=1d'));
        const d = await r.json();
        const price = d.chart.result[0].meta.regularMarketPrice;
        const prev = d.chart.result[0].meta.chartPreviousClose;
        const chg = price - prev;
        const pct = (chg / prev) * 100;

        const pm = document.getElementById('pMain');
        pm.textContent = price.toFixed(2);
        pm.style.color = chg >= 0 ? 'var(--bull)' : 'var(--bear)';
        
        document.getElementById('pChg').textContent = `${chg >= 0 ? '▲' : '▼'} ${Math.abs(chg).toFixed(2)} (${Math.abs(pct).toFixed(2)}%)`;
        document.getElementById('pChg').style.color = chg >= 0 ? 'var(--bull)' : 'var(--bear)';

        // تحديث الأهداف الوهمية بناءً على السعر
        document.getElementById('sEntry').textContent = price.toFixed(2);
        document.getElementById('sT1').textContent = (price + 8).toFixed(2);
        document.getElementById('sT2').textContent = (price + 18).toFixed(2);
        document.getElementById('sSL').textContent = (price - 10).toFixed(2);
        
    } catch(e) { }
}
setInterval(fetchPrice, 5000);
fetchPrice();

setInterval(() => {
    const t = new Date();
    document.getElementById('sclk').textContent = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;
}, 1000);
</script> 
</body> 
</html>
