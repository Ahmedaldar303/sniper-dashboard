<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رادار القناص | Market Dashboard</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #333; cursor: pointer; }
        th { background-color: #1e1e1e; color: #bb86fc; }
        tr:hover { background-color: #2a2a2a; }
        .highlight { background-color: rgba(3, 218, 197, 0.2); border-left: 4px solid #03dac6; }
        .positive { color: #03dac6; }
        .negative { color: #cf6679; }
        #chart-container { margin-top: 30px; height: 500px; }
    </style>
</head>
<body>

    <h2>🎯 لوحة تحكم القناص (0DTE & Swing)</h2>
    <table>
        <thead>
            <tr>
                <th>الرمز</th>
                <th>السعر ($)</th>
                <th>التغير (%)</th>
                <th>الزخم (SMI)</th>
                <th>المقاومة (R1)</th>
                <th>الدعم (S1)</th>
                <th>ATR</th>
                <th>البعد عن SMA50</th>
            </tr>
        </thead>
        <tbody id="data-body"></tbody>
    </table>

    <div id="chart-container"></div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('data-body');
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    if(row.highlight) tr.classList.add('highlight');
                    
                    const changeClass = row.change >= 0 ? 'positive' : 'negative';
                    const distClass = row.dist_sma50 >= 0 ? 'positive' : 'negative';
                    const smiClass = row.smi >= 0 ? 'positive' : 'negative';

                    tr.innerHTML = `
                        <td><strong>${row.symbol}</strong></td>
                        <td>${row.price}</td>
                        <td class="${changeClass}">${row.change}%</td>
                        <td class="${smiClass}">${row.smi}</td>
                        <td class="negative">${row.r1}</td>
                        <td class="positive">${row.s1}</td>
                        <td>${row.atr}</td>
                        <td class="${distClass}">${row.dist_sma50}%</td>
                    `;
                    
                    tr.onclick = () => loadChart(row.symbol);
                    tbody.appendChild(tr);
                });
            });

        function loadChart(symbol) {
            document.getElementById('chart-container').innerHTML = '';
            const script = document.createElement('script');
            script.src = 'https://s3.tradingview.com/tv.js';
            script.onload = () => {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": symbol === 'SPX' ? 'SP:SPX' : symbol,
                    "interval": "D",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "container_id": "chart-container"
                });
            };
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
